<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Academic planner demonstration</title>
  <desc id="desc">A preview of the task planner with active and completed study tasks.</desc>
  <rect width="960" height="540" fill="#F5F2EA"/>
  <rect x="54" y="50" width="852" height="440" fill="#FFFDF8" stroke="#BDB5A5"/>
  <text x="88" y="92" fill="#245B46" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="2">ACADEMIC PLANNER</text>
  <text x="88" y="137" fill="#17211B" font-family="IBM Plex Sans, sans-serif" font-size="28" font-weight="500">Keep the next task clear.</text>
  <rect x="88" y="168" width="570" height="48" fill="#FFFFFF" stroke="#BDB5A5"/>
  <text x="108" y="198" fill="#626A64" font-family="IBM Plex Sans, sans-serif" font-size="15">Finish responsive design review</text>
  <rect x="674" y="168" width="144" height="48" fill="#245B46"/>
  <text x="746" y="198" fill="#FFFFFF" font-family="IBM Plex Sans, sans-serif" font-size="15" text-anchor="middle">Add task</text>
  <line x1="88" y1="252" x2="872" y2="252" stroke="#D8D2C5"/>
  <circle cx="108" cy="299" r="10" fill="#FFFFFF" stroke="#BDB5A5"/>
  <text x="140" y="295" fill="#17211B" font-family="IBM Plex Sans, sans-serif" font-size="17">Review Web Technologies notes</text>
  <text x="140" y="319" fill="#626A64" font-family="IBM Plex Mono, monospace" font-size="11">STUDY  /  NO DUE DATE</text>
  <line x1="88" y1="342" x2="872" y2="342" stroke="#D8D2C5"/>
  <circle cx="108" cy="389" r="10" fill="#245B46" stroke="#245B46"/>
  <path d="M103 389l4 4 7-9" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <text x="140" y="385" fill="#626A64" font-family="IBM Plex Sans, sans-serif" font-size="17" text-decoration="line-through">Polish portfolio screenshots</text>
  <text x="140" y="409" fill="#626A64" font-family="IBM Plex Mono, monospace" font-size="11">PROJECT  /  COMPLETE</text>
  <text x="872" y="462" fill="#B97824" font-family="IBM Plex Mono, monospace" font-size="11" text-anchor="end">ADD / COMPLETE / DELETE</text>
</svg>
